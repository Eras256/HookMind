[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
verbosity = 3
[profile.default.fuzz]
runs = 10000
max_test_rejects = 65536
[profile.default.invariant]
runs = 1000
depth = 100
call_override = false
[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"
unichain_mainnet = "${UNICHAIN_MAINNET_RPC}"
ethereum_sepolia = "${ETHEREUM_SEPOLIA_RPC}"
[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://sepolia.uniscan.xyz/api" }
unichain_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://uniscan.xyz/api" }
