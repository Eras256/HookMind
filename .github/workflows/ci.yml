name: HookMind CI
on:
  push:    { branches: [main, dev] }
  pull_request: { branches: [main] }
jobs:
  contracts:
    name: Foundry Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with: { version: nightly }
      - name: Install deps
        run:  cd packages/contracts && forge install
      - name: Run tests (with fuzzing)
        run:  cd packages/contracts && forge test --gas-report -vvv
        env:
          UNICHAIN_SEPOLIA_RPC: ${{ secrets.UNICHAIN_SEPOLIA_RPC }}
      - name: Coverage Report
        run:  cd packages/contracts && forge coverage --report lcov
      - name: Slither Security Analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target:     packages/contracts/src/
          slither-args: "--exclude-dependencies"
  frontend:
    name: Next.js Build + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hookmind/web lint
      - run: pnpm --filter @hookmind/web build
        env:
          NEXT_PUBLIC_HOOK_ADDRESS: "0x0000000000000000000000000000000000000001"
          NEXT_PUBLIC_WS_URL:       "ws://localhost:3001"
  agent:
    name: TypeScript SDK + Agent Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hookmind/agent build
      - run: pnpm --filter @hookmind/sdk build
      - run: pnpm --filter @hookmind/mcp build
